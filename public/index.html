<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>UX Agent</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css" />
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#ffffff;--bg2:#f7f7f6;--bg3:#f0f0ef;
  --text:#1a1a1a;--text2:#6b6b6b;--text3:#9b9b9b;
  --border:rgba(0,0,0,0.1);--border2:rgba(0,0,0,0.18);
  --accent:#4f46e5;--accent-light:#eef2ff;--accent-mid:#c7d2fe;
  --radius:8px;--radius-lg:12px;
  --success:#059669;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#1c1c1c;--bg2:#242424;--bg3:#2c2c2c;
  --text:#e8e8e8;--text2:#a0a0a0;--text3:#606060;
  --border:rgba(255,255,255,0.1);--border2:rgba(255,255,255,0.2);
  --accent-light:#1e1b4b;--accent-mid:#3730a3;
}}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg3);color:var(--text);height:100vh;display:flex;align-items:center;justify-content:center;padding:12px}
.shell{display:flex;width:100%;max-width:1100px;height:660px;border:0.5px solid var(--border2);border-radius:var(--radius-lg);overflow:hidden;background:var(--bg);box-shadow:0 4px 24px rgba(0,0,0,0.08)}

/* SIDEBAR */
.sidebar{width:220px;min-width:220px;border-right:0.5px solid var(--border);display:flex;flex-direction:column;background:var(--bg2)}
.sidebar-header{padding:16px 14px 12px;border-bottom:0.5px solid var(--border)}
.logo{font-size:14px;font-weight:600;color:var(--text);letter-spacing:-0.02em}
.logo span{color:var(--accent)}
.logo-sub{font-size:11px;color:var(--text3);margin-top:2px}
.sidebar-section{padding:12px 10px 4px;font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.07em}
.proj-item{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:6px;cursor:pointer;font-size:13px;color:var(--text2);margin:1px 6px;transition:background 0.12s}
.proj-item:hover{background:var(--bg)}
.proj-item.active{background:var(--bg);color:var(--text);font-weight:500}
.proj-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.proj-conn{font-size:10px;color:var(--text3);margin-left:auto}
.new-proj-btn{display:flex;align-items:center;gap:6px;padding:7px 10px;margin:4px 6px;border-radius:6px;font-size:12px;color:var(--text3);cursor:pointer;border:none;background:none;width:calc(100% - 12px);text-align:left;transition:all 0.12s}
.new-proj-btn:hover{background:var(--bg);color:var(--text2)}
.sidebar-footer{margin-top:auto;padding:10px;border-top:0.5px solid var(--border);font-size:11px;color:var(--text3);display:flex;align-items:center;gap:5px}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{display:flex;align-items:center;gap:10px;padding:11px 16px;border-bottom:0.5px solid var(--border);background:var(--bg)}
.proj-name{font-size:14px;font-weight:500;color:var(--text)}
.proj-sub{font-size:12px;color:var(--text3);margin-left:4px}
.topbar-right{margin-left:auto;display:flex;gap:6px}
.btn{font-size:12px;padding:6px 11px;border-radius:6px;border:0.5px solid var(--border2);background:none;color:var(--text2);cursor:pointer;display:flex;align-items:center;gap:5px;transition:all 0.12s;font-family:inherit}
.btn:hover{background:var(--bg2)}
.btn-primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn-primary:hover{background:#4338ca;border-color:#4338ca}

/* STEPS NAV */
.steps-nav{display:flex;align-items:center;padding:0 4px;border-bottom:0.5px solid var(--border);background:var(--bg);overflow-x:auto}
.step-tab{display:flex;align-items:center;gap:6px;padding:10px 11px;font-size:12px;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;white-space:nowrap;transition:color 0.12s}
.step-tab:hover{color:var(--text2)}
.step-tab.active{color:var(--text);border-bottom-color:var(--accent);font-weight:500}
.step-num{width:18px;height:18px;border-radius:50%;background:var(--bg3);font-size:10px;display:flex;align-items:center;justify-content:center;font-weight:600;color:var(--text3);flex-shrink:0}
.step-tab.active .step-num{background:var(--accent);color:#fff}
.step-tab.done .step-num{background:var(--success);color:#fff}

/* CONTENT */
.content{flex:1;overflow-y:auto;padding:20px}
.s-label{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:6px}
.s-desc{font-size:12px;color:var(--text3);margin-bottom:12px;line-height:1.6}
textarea,.txt-in{width:100%;border:0.5px solid var(--border2);border-radius:var(--radius);padding:10px 12px;font-size:13px;font-family:inherit;color:var(--text);background:var(--bg);resize:vertical;line-height:1.65;outline:none;transition:border-color 0.12s}
textarea:focus,.txt-in:focus{border-color:var(--accent)}

/* UPLOAD */
.upload-zone{border:0.5px dashed var(--border2);border-radius:var(--radius);padding:18px;text-align:center;cursor:pointer;position:relative;transition:background 0.12s}
.upload-zone:hover{background:var(--bg2)}
.upload-zone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.file-list{display:flex;flex-direction:column;gap:6px;margin-top:10px}
.file-item{display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--bg2);border-radius:6px;border:0.5px solid var(--border)}
.file-name{font-size:12px;color:var(--text);flex:0 0 auto;max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.file-note{font-size:11px;border:none;background:none;color:var(--text2);outline:none;flex:1;font-family:inherit}
.file-del{background:none;border:none;color:var(--text3);cursor:pointer;font-size:15px;padding:0 2px;line-height:1}

/* LIMITS */
.split{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.sub-block{border:0.5px solid var(--border);border-radius:var(--radius);padding:12px}
.sub-title{font-size:11px;font-weight:600;color:var(--text2);margin-bottom:8px;display:flex;align-items:center;gap:5px}

/* LINKS */
.link-row{display:flex;gap:6px;margin-bottom:6px;align-items:center}
.link-row input{flex:1;border:0.5px solid var(--border2);border-radius:6px;padding:7px 10px;font-size:12px;font-family:inherit;color:var(--text);background:var(--bg);outline:none}
.link-row input:focus{border-color:var(--accent)}
.link-type{font-size:11px;padding:7px 8px;border:0.5px solid var(--border);border-radius:6px;background:var(--bg2);color:var(--text2);cursor:pointer;white-space:nowrap;font-family:inherit}
.link-del{background:none;border:none;color:var(--text3);cursor:pointer;font-size:15px}

/* KPI TAGS */
.kpi-grid{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.kpi-tag{padding:5px 12px;border-radius:20px;font-size:12px;background:var(--bg2);color:var(--text2);border:0.5px solid var(--border);cursor:pointer;transition:all 0.12s;user-select:none}
.kpi-tag:hover{border-color:var(--accent-mid)}
.kpi-tag.on{background:var(--accent);color:#fff;border-color:var(--accent)}

/* ANALYSIS */
.chat-wrap{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px}
.agent-bubble{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:14px 16px;font-size:13px;line-height:1.75;color:var(--text)}
.agent-label{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:6px;display:flex;align-items:center;gap:4px}
.user-bubble{background:var(--accent-light);border:0.5px solid var(--accent-mid);border-radius:var(--radius-lg);padding:10px 14px;font-size:13px;color:var(--accent);align-self:flex-end;max-width:75%;line-height:1.6}
.chat-bar{border-top:0.5px solid var(--border);padding:10px 14px;display:flex;gap:8px;align-items:flex-end;background:var(--bg)}
.chat-bar textarea{resize:none;min-height:36px;max-height:120px;flex:1;overflow-y:auto}
.send-btn{padding:8px 14px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius);font-size:13px;cursor:pointer;flex-shrink:0;font-family:inherit;transition:background 0.12s}
.send-btn:hover{background:#4338ca}
.send-btn:disabled{background:var(--border2);cursor:not-allowed}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:8px;color:var(--text3);font-size:13px;text-align:center}
.empty-icon{font-size:32px;margin-bottom:4px}

/* MODAL */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.35);z-index:200;align-items:center;justify-content:center}
.modal-box{background:var(--bg);border-radius:var(--radius-lg);border:0.5px solid var(--border2);padding:20px;width:340px;max-height:420px;overflow-y:auto}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.modal-title{font-size:14px;font-weight:500;color:var(--text)}
.conn-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:6px;border:0.5px solid var(--border);font-size:12px;color:var(--text2);cursor:pointer;margin-bottom:6px;transition:all 0.12s;background:var(--bg)}
.conn-item:hover{border-color:var(--border2)}
.conn-item.linked{border-color:var(--accent-mid);background:var(--accent-light);color:var(--accent)}

/* NAV BUTTONS */
.nav-btns{display:flex;justify-content:space-between;margin-top:18px}
.section-gap{margin-top:16px}
</style>
</head>
<body>

<div class="shell">
  <div class="sidebar">
    <div class="sidebar-header">
      <div class="logo">UX <span>Agent</span></div>
      <div class="logo-sub">Farmacity · workspace</div>
    </div>
    <div class="sidebar-section">Proyectos</div>
    <div id="proj-list"></div>
    <button class="new-proj-btn" onclick="newProject()">
      <i class="ti ti-plus"></i> Nuevo proyecto
    </button>
    <div class="sidebar-footer"><i class="ti ti-sparkles"></i> Llama 4 · Groq</div>
  </div>

  <div class="main">
    <div class="topbar">
      <div>
        <span class="proj-name" id="t-name">—</span>
        <span class="proj-sub" id="t-sub"></span>
      </div>
      <div class="topbar-right">
        <button class="btn" onclick="showModal()"><i class="ti ti-link"></i> Conectar</button>
        <button class="btn btn-primary" onclick="goStep(5)"><i class="ti ti-brain"></i> Analizar</button>
      </div>
    </div>
    <div class="steps-nav" id="steps-nav"></div>
    <div id="step-body" style="flex:1;overflow:hidden;display:flex;flex-direction:column"></div>
  </div>
</div>

<div class="modal-bg" id="modal">
  <div class="modal-box">
    <div class="modal-header">
      <span class="modal-title">Conectar proyectos</span>
      <button onclick="closeModal()" style="background:none;border:none;cursor:pointer;color:var(--text3);font-size:18px"><i class="ti ti-x"></i></button>
    </div>
    <p style="font-size:12px;color:var(--text3);margin-bottom:12px;line-height:1.5">El agente considerará el trabajo previo de los proyectos que conectes.</p>
    <div id="modal-list"></div>
    <button class="btn btn-primary" onclick="closeModal()" style="margin-top:12px;width:100%;justify-content:center">Guardar</button>
  </div>
</div>

<script>
const STORE = 'uxagent_v3';
const ACTIVE = 'uxagent_active_v3';
const KPI_LIST = ['Tasa de conversión','Drop en checkout','Tiempo en tarea','Tasa de error','NPS / CSAT','Bounce rate','Click-through rate','Tasa de abandono','Time to first action','Tasa de retención'];
const COLORS = ['#4f46e5','#0d9488','#d97706','#dc2626','#7c3aed','#059669'];
const STEPS = ['Materiales','Contexto','Limitantes','Referencias','Objetivo & KPIs','Análisis'];

let projects, activeId, step = 0;

function load() {
  try { projects = JSON.parse(localStorage.getItem(STORE)) || defaultProjects(); } catch { projects = defaultProjects(); }
  activeId = localStorage.getItem(ACTIVE) || projects[0].id;
}
function save() {
  try { localStorage.setItem(STORE, JSON.stringify(projects)); localStorage.setItem(ACTIVE, activeId); } catch {}
}
function defaultProjects() {
  return [
    mk('Checkout Friction Q2','Farmacity · ecommerce',COLORS[0]),
    mk('Home & Categorías','Farmacity · navegación',COLORS[1]),
  ];
}
function mk(name, desc, color) {
  return { id:'p'+Date.now()+Math.random(), name, desc, color, materials:[], context:'', limitTech:'', limitCtx:'', links:[], objective:'', kpis:[], kpiCustom:'', connectedTo:[], messages:[] };
}
function active() { return projects.find(p => p.id === activeId) || projects[0]; }

function renderSidebar() {
  const proj = active();
  document.getElementById('t-name').textContent = proj.name;
  document.getElementById('t-sub').textContent = proj.desc;
  document.getElementById('proj-list').innerHTML = projects.map(p => `
    <div class="proj-item ${p.id===activeId?'active':''}" onclick="switchProj('${p.id}')">
      <span class="proj-dot" style="background:${p.color}"></span>
      <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:13px">${p.name}</span>
      ${p.connectedTo?.length ? '<i class="ti ti-link proj-conn"></i>' : ''}
    </div>`).join('');
  const nav = document.getElementById('steps-nav');
  nav.innerHTML = STEPS.map((s,i) => `
    <div class="step-tab ${i===step?'active':''}" onclick="goStep(${i})">
      <span class="step-num" id="sn${i}">${i+1}</span>${s}
    </div>`).join('');
}

function switchProj(id) { activeId = id; step = 0; save(); renderSidebar(); renderStep(); }

function newProject() {
  const name = prompt('Nombre del proyecto:');
  if (!name) return;
  const p = mk(name, 'Farmacity', COLORS[projects.length % COLORS.length]);
  projects.push(p); activeId = p.id; step = 0; save(); renderSidebar(); renderStep();
}

function goStep(n) { collectCurrent(); step = n; save(); renderSidebar(); renderStep(); }

function collectCurrent() {
  const p = active();
  const v = id => document.getElementById(id)?.value;
  if (step===1 && v('ctx')) p.context = v('ctx');
  if (step===2) { if(v('lt')) p.limitTech=v('lt'); if(v('lc')) p.limitCtx=v('lc'); }
  if (step===4) { if(v('obj')) p.objective=v('obj'); if(v('kc')) p.kpiCustom=v('kc'); }
  save();
}

function renderStep() {
  const p = active();
  const body = document.getElementById('step-body');
  if (step===0) body.innerHTML = stepMaterials(p);
  else if (step===1) body.innerHTML = stepContext(p);
  else if (step===2) body.innerHTML = stepLimits(p);
  else if (step===3) body.innerHTML = stepRefs(p);
  else if (step===4) body.innerHTML = stepObjective(p);
  else body.innerHTML = stepAnalysis(p);
  attachStep(p);
}

function stepMaterials(p) {
  return `<div class="content">
    <div class="s-label">Materiales</div>
    <div class="s-desc">Subí archivos relevantes: planillas de métricas, exports de Analytics o Clarity, bitácoras, grabaciones resumidas. Podés añadir una nota aclaratoria a cada uno.</div>
    <div class="upload-zone">
      <input type="file" multiple id="finput" />
      <div style="font-size:22px;color:var(--text3);margin-bottom:6px"><i class="ti ti-upload"></i></div>
      <div style="font-size:12px;color:var(--text2)">Arrastrá archivos o hacé click para seleccionar</div>
      <div style="font-size:11px;color:var(--text3);margin-top:2px">CSV, XLSX, PDF, PNG · múltiples archivos</div>
    </div>
    <div class="file-list" id="flist">
      ${(p.materials||[]).map((f,i)=>`
        <div class="file-item">
          <i class="ti ti-file" style="font-size:15px;color:var(--text3)"></i>
          <span class="file-name">${f.name}</span>
          <input class="file-note" placeholder="nota aclaratoria..." value="${f.note||''}" data-fi="${i}" />
          <button class="file-del" data-fd="${i}"><i class="ti ti-x"></i></button>
        </div>`).join('')}
    </div>
    <div class="nav-btns"><div></div><button class="btn btn-primary" onclick="goStep(1)">Siguiente <i class="ti ti-arrow-right"></i></button></div>
  </div>`;
}

function stepContext(p) {
  return `<div class="content">
    <div class="s-label">Contexto</div>
    <div class="s-desc">Todo lo que el agente necesita saber para interpretar los datos correctamente: negocio, audiencia, estado actual, hipótesis previas, lo que ya se intentó.</div>
    <textarea id="ctx" rows="8" placeholder="Ej: Farmacity es la cadena de farmacias líder en Argentina. El flujo de checkout fue rediseñado en marzo 2024. Nuestro usuario principal es mujer, 35-55 años, urbana, con intención de compra clara pero baja tolerancia a fricciones digitales...">${p.context||''}</textarea>
    <div class="section-gap">
      <div class="s-label">Archivos de contexto <span style="font-weight:400;text-transform:none;font-size:11px">(opcional)</span></div>
      <div class="upload-zone" style="padding:12px">
        <input type="file" multiple />
        <div style="font-size:12px;color:var(--text3)"><i class="ti ti-file-text"></i> Briefs, personas, research previo</div>
      </div>
    </div>
    <div class="nav-btns">
      <button class="btn" onclick="goStep(0)"><i class="ti ti-arrow-left"></i> Atrás</button>
      <button class="btn btn-primary" onclick="goStep(2)">Siguiente <i class="ti ti-arrow-right"></i></button>
    </div>
  </div>`;
}

function stepLimits(p) {
  return `<div class="content">
    <div class="s-label">Limitantes</div>
    <div class="s-desc">Delimitá el campo de acción para que las recomendaciones sean realistas y accionables dentro de tu contexto real.</div>
    <div class="split">
      <div class="sub-block">
        <div class="sub-title"><i class="ti ti-cpu" style="color:var(--accent)"></i> Técnicas</div>
        <textarea id="lt" rows="6" placeholder="Ej: No podemos tocar el backend de pagos hasta Q4. El design system usa Material 2. Sin acceso a A/B testing en prod...">${p.limitTech||''}</textarea>
      </div>
      <div class="sub-block">
        <div class="sub-title"><i class="ti ti-building" style="color:#0d9488"></i> Contextuales / políticas</div>
        <textarea id="lc" rows="6" placeholder="Ej: Legal requiere 3 semanas para aprobar cambios en el flujo de consentimiento. No podemos eliminar el registro obligatorio...">${p.limitCtx||''}</textarea>
      </div>
    </div>
    <div class="nav-btns">
      <button class="btn" onclick="goStep(1)"><i class="ti ti-arrow-left"></i> Atrás</button>
      <button class="btn btn-primary" onclick="goStep(3)">Siguiente <i class="ti ti-arrow-right"></i></button>
    </div>
  </div>`;
}

function stepRefs(p) {
  const links = p.links || [];
  return `<div class="content">
    <div class="s-label">Referencias</div>
    <div class="s-desc">Links que el agente debe considerar: competidores, benchmarks, prototipos en Figma, o flujos de referencia visual/funcional.</div>
    <div id="llist">
      ${links.map((l,i)=>`
        <div class="link-row">
          <select class="link-type" data-lt="${i}">
            <option ${l.type==='bench'?'selected':''} value="bench">Bench</option>
            <option ${l.type==='figma'?'selected':''} value="figma">Figma</option>
            <option ${l.type==='ref'?'selected':''} value="ref">Referencia</option>
            <option ${l.type==='comp'?'selected':''} value="comp">Competidor</option>
          </select>
          <input placeholder="https://..." value="${l.url||''}" data-lu="${i}" />
          <button class="link-del" data-ld="${i}"><i class="ti ti-x"></i></button>
        </div>`).join('')}
    </div>
    <button class="btn" onclick="addLink()" style="margin-top:6px"><i class="ti ti-plus"></i> Agregar link</button>
    <div class="nav-btns">
      <button class="btn" onclick="goStep(2)"><i class="ti ti-arrow-left"></i> Atrás</button>
      <button class="btn btn-primary" onclick="goStep(4)">Siguiente <i class="ti ti-arrow-right"></i></button>
    </div>
  </div>`;
}

function stepObjective(p) {
  const sel = p.kpis || [];
  return `<div class="content">
    <div class="s-label">Objetivo & KPIs</div>
    <div class="s-desc">Definí qué querés lograr y sobre qué métricas querés impactar. Esto orienta las recomendaciones del agente.</div>
    <div class="s-label">Objetivo principal</div>
    <textarea id="obj" rows="3" placeholder="Ej: Reducir el abandono en el paso de pago del checkout web un 15% para Q3 2025...">${p.objective||''}</textarea>
    <div class="s-label" style="margin-top:14px">KPIs a impactar</div>
    <div class="kpi-grid" id="kpi-grid">
      ${KPI_LIST.map(k=>`<div class="kpi-tag ${sel.includes(k)?'on':''}" onclick="toggleKpi(this,'${k}')">${k}</div>`).join('')}
      <div class="kpi-tag" onclick="toggleCustom()" style="border-style:dashed"><i class="ti ti-plus"></i> Personalizado</div>
    </div>
    <input id="kc" class="txt-in" style="margin-top:10px;display:${p.kpiCustom?'block':'none'}" placeholder="KPI personalizado..." value="${p.kpiCustom||''}" />
    <div class="nav-btns">
      <button class="btn" onclick="goStep(3)"><i class="ti ti-arrow-left"></i> Atrás</button>
      <button class="btn btn-primary" onclick="goStep(5)"><i class="ti ti-brain"></i> Analizar ahora</button>
    </div>
  </div>`;
}

function stepAnalysis(p) {
  const msgs = p.messages || [];
  return `
    <div class="chat-wrap" id="chat-wrap">
      ${msgs.length === 0
        ? `<div class="empty-state"><div class="empty-icon"><i class="ti ti-brain"></i></div><span>Generando análisis inicial...</span></div>`
        : msgs.map(m => m.role === 'agent'
            ? `<div><div class="agent-label"><i class="ti ti-sparkles"></i> Agente UX</div><div class="agent-bubble">${m.content.replace(/\n/g,'<br>')}</div></div>`
            : `<div style="display:flex;justify-content:flex-end"><div class="user-bubble">${m.content}</div></div>`
          ).join('')}
    </div>
    <div class="chat-bar">
      <textarea id="chat-in" placeholder="Seguí refinando con el agente..." onkeydown="chatKey(event)" rows="1"></textarea>
      <button class="send-btn" onclick="sendChat()" id="sbtn"><i class="ti ti-send"></i></button>
    </div>`;
}

function attachStep(p) {
  const fi = document.getElementById('finput');
  if (fi) fi.addEventListener('change', e => {
    Array.from(e.target.files).forEach(f => p.materials.push({ name: f.name, note: '' }));
    save(); renderStep();
  });
  document.querySelectorAll('[data-fi]').forEach(inp => {
    inp.addEventListener('input', e => { p.materials[+e.target.dataset.fi].note = e.target.value; save(); });
  });
  document.querySelectorAll('[data-fd]').forEach(btn => {
    btn.addEventListener('click', () => { p.materials.splice(+btn.dataset.fd, 1); save(); renderStep(); });
  });
  document.querySelectorAll('[data-lu]').forEach(inp => {
    inp.addEventListener('input', e => { p.links[+e.target.dataset.lu].url = e.target.value; save(); });
  });
  document.querySelectorAll('[data-lt]').forEach(sel => {
    sel.addEventListener('change', e => { p.links[+e.target.dataset.lt].type = e.target.value; save(); });
  });
  document.querySelectorAll('[data-ld]').forEach(btn => {
    btn.addEventListener('click', () => { p.links.splice(+btn.dataset.ld, 1); save(); renderStep(); });
  });
  if (step === 5 && (p.messages || []).length === 0) setTimeout(runAnalysis, 400);
}

function toggleKpi(el, k) {
  const p = active(); if (!p.kpis) p.kpis = [];
  if (p.kpis.includes(k)) { p.kpis = p.kpis.filter(x => x !== k); el.classList.remove('on'); }
  else { p.kpis.push(k); el.classList.add('on'); }
  save();
}
function toggleCustom() {
  const inp = document.getElementById('kc');
  if (inp) { inp.style.display = inp.style.display === 'none' ? 'block' : 'none'; if (inp.style.display === 'block') inp.focus(); }
}
function addLink() {
  const p = active(); p.links.push({ url: '', type: 'bench' }); save(); renderStep();
}

function buildPrompt(p, userMsg) {
  const connNames = projects.filter(x => p.connectedTo?.includes(x.id)).map(x => `"${x.name}"`).join(', ');
  const history = (p.messages || []).slice(-6).map(m => `${m.role === 'agent' ? 'Agente' : 'Usuario'}: ${m.content}`).join('\n');
  return `=== PROYECTO: ${p.name} ===

CONTEXTO:
${p.context || '(no especificado)'}

MATERIALES DISPONIBLES:
${(p.materials||[]).length ? p.materials.map(f=>`- ${f.name}${f.note?' ('+f.note+')':''}`).join('\n') : '(sin archivos — inferir desde el contexto escrito)'}

LIMITANTES TÉCNICAS:
${p.limitTech || '(ninguna)'}

LIMITANTES CONTEXTUALES / POLÍTICAS:
${p.limitCtx || '(ninguna)'}

REFERENCIAS:
${(p.links||[]).length ? p.links.map(l=>`- [${l.type}] ${l.url}`).join('\n') : '(ninguna)'}

OBJETIVO:
${p.objective || '(no especificado)'}

KPIs A IMPACTAR:
${[...(p.kpis||[]), p.kpiCustom].filter(Boolean).join(', ') || '(no especificados)'}
${connNames ? `\nPROYECTOS CONECTADOS (considerá aprendizajes transferibles de): ${connNames}` : ''}
${history ? `\nCONVERSACIÓN PREVIA:\n${history}` : ''}
${userMsg ? `\nMENSAJE DEL USUARIO:\n${userMsg}` : '\nINSTRUCCIÓN: Generá el análisis inicial.'}`;
}

const SYSTEM = `Sos un agente UX senior especializado en retail digital y e-commerce latinoamericano. Trabajás con el equipo de UX de Farmacity Argentina.

Tu forma de responder:
- En el análisis inicial: máximo 2 párrafos. Primero las claves que encontrás en los datos/contexto. Segundo qué sugerís hacer y por qué, justificado con lo que te dieron.
- En el chat de refinamiento: respuestas directas, concretas, en tono colega-a-colega. Sin preambulosad ni frases de relleno.
- Siempre anclar recomendaciones en los datos o contexto provistos. Si algo no está claro, pedilo.
- Considerá siempre las limitantes antes de recomendar algo.`;

async function callGroq(userContent) {
  const res = await fetch('/api/chat', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ system: SYSTEM, messages: [{ role: 'user', content: userContent }] })
  });
  const data = await res.json();
  if (data.error) throw new Error(data.error);
  return data.text;
}

async function runAnalysis() {
  const p = active();
  if (!p.messages) p.messages = [];
  const wrap = document.getElementById('chat-wrap');
  if (wrap) wrap.innerHTML = `<div class="empty-state"><div class="empty-icon"><i class="ti ti-sparkles"></i></div><span>Analizando...</span></div>`;
  try {
    const text = await callGroq(buildPrompt(p, null));
    p.messages.push({ role: 'agent', content: text });
    save(); renderStep();
  } catch (e) {
    if (wrap) wrap.innerHTML = `<div class="agent-bubble" style="color:red">Error: ${e.message}</div>`;
  }
}

async function sendChat() {
  const p = active();
  const inp = document.getElementById('chat-in');
  const msg = inp?.value?.trim();
  if (!msg) return;
  if (!p.messages) p.messages = [];
  p.messages.push({ role: 'user', content: msg });
  inp.value = '';
  save(); renderStep();
  const wrap = document.getElementById('chat-wrap');
  const loading = document.createElement('div');
  loading.innerHTML = `<div class="agent-label"><i class="ti ti-sparkles"></i> Agente UX</div><div class="agent-bubble" style="color:var(--text3)">Pensando...</div>`;
  wrap?.appendChild(loading);
  wrap.scrollTop = wrap.scrollHeight;
  try {
    const text = await callGroq(buildPrompt(p, msg));
    p.messages.push({ role: 'agent', content: text });
    save(); renderStep();
    setTimeout(() => { const w = document.getElementById('chat-wrap'); if(w) w.scrollTop = w.scrollHeight; }, 100);
  } catch (e) {
    loading.innerHTML = `<div class="agent-bubble" style="color:red">Error: ${e.message}</div>`;
  }
}

function chatKey(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendChat(); } }

function showModal() {
  const p = active();
  const others = projects.filter(x => x.id !== activeId);
  document.getElementById('modal-list').innerHTML = others.length
    ? others.map(x => `
        <div class="conn-item ${p.connectedTo?.includes(x.id)?'linked':''}" onclick="toggleConn('${x.id}',this)">
          <span class="proj-dot" style="background:${x.color}"></span>
          <span style="flex:1">${x.name}</span>
          <i class="ti ti-link"></i>
        </div>`).join('')
    : `<p style="font-size:12px;color:var(--text3)">No hay otros proyectos aún.</p>`;
  document.getElementById('modal').style.display = 'flex';
}
function toggleConn(id, el) {
  const p = active(); if (!p.connectedTo) p.connectedTo = [];
  if (p.connectedTo.includes(id)) { p.connectedTo = p.connectedTo.filter(x=>x!==id); el.classList.remove('linked'); }
  else { p.connectedTo.push(id); el.classList.add('linked'); }
  save(); renderSidebar();
}
function closeModal() { document.getElementById('modal').style.display = 'none'; }

load(); renderSidebar(); renderStep();
</script>
</body>
</html>
